<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nature Account — Molotov Alva, Bank Manager</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#080502;overflow:hidden;color:#e8d3a8;font-family:Georgia,'Times New Roman',serif}
  #frame{
    position:relative;width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,#160d05 0%,#000 80%);
  }
  svg#scene{
    width:min(100vw, 160vh);
    height:min(62.5vw, 100vh);
    background:#0a0604;
    box-shadow:0 0 80px rgba(0,0,0,.9), 0 0 0 1px #2a1d10;
    display:block;
  }
  .clickable{cursor:pointer}
  #speech{opacity:0;transition:opacity .35s ease;pointer-events:none}
  #speech.show{opacity:1}
  .ringing{animation:ring .55s ease}
  @keyframes ring{
    0%,100%{transform:translate(0,0)}
    20%{transform:translate(-4px,1px)}
    40%{transform:translate(4px,1px)}
    60%{transform:translate(-3px,0)}
    80%{transform:translate(3px,0)}
  }
</style>
</head>
<body>
<div id="frame">
<svg id="scene" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" aria-label="Isometric bank manager office">
  <defs>
    <linearGradient id="wallG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8d0a2"/>
      <stop offset="1" stop-color="#a48656"/>
    </linearGradient>
    <linearGradient id="wallGdark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c0a370"/>
      <stop offset="1" stop-color="#80683e"/>
    </linearGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a4f2c"/>
      <stop offset="1" stop-color="#3a1f0a"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5dc94"/>
      <stop offset=".5" stop-color="#c8a44a"/>
      <stop offset="1" stop-color="#7a5e1a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf3df"/>
      <stop offset="1" stop-color="#e6d6b0"/>
    </linearGradient>
    <linearGradient id="deskTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b5a2e"/>
      <stop offset="1" stop-color="#5a3216"/>
    </linearGradient>
    <linearGradient id="deskFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a3a1a"/>
      <stop offset="1" stop-color="#2a1808"/>
    </linearGradient>
    <linearGradient id="deskSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a1f0a"/>
      <stop offset="1" stop-color="#5a3216"/>
    </linearGradient>
    <radialGradient id="bellG" cx=".35" cy=".25" r=".85">
      <stop offset="0" stop-color="#ff9292"/>
      <stop offset=".4" stop-color="#d23030"/>
      <stop offset="1" stop-color="#5a0e0e"/>
    </radialGradient>
    <radialGradient id="globeG" cx=".4" cy=".35" r=".7">
      <stop offset="0" stop-color="#8ec2dc"/>
      <stop offset=".6" stop-color="#3478a8"/>
      <stop offset="1" stop-color="#143a5c"/>
    </radialGradient>
    <radialGradient id="skinG" cx=".4" cy=".3" r=".8">
      <stop offset="0" stop-color="#f3d7af"/>
      <stop offset=".7" stop-color="#dcb487"/>
      <stop offset="1" stop-color="#a8784c"/>
    </radialGradient>
    <radialGradient id="beardG" cx=".5" cy=".2" r=".9">
      <stop offset="0" stop-color="#fbfaf3"/>
      <stop offset=".7" stop-color="#ebe5d4"/>
      <stop offset="1" stop-color="#bdb59e"/>
    </radialGradient>
    <radialGradient id="lightPool" cx=".5" cy=".25" r=".7">
      <stop offset="0" stop-color="rgba(255,225,160,0.35)"/>
      <stop offset="1" stop-color="rgba(255,225,160,0)"/>
    </radialGradient>
    <radialGradient id="vignette" cx=".5" cy=".5" r=".9">
      <stop offset=".55" stop-color="rgba(0,0,0,0)"/>
      <stop offset="1" stop-color="rgba(0,0,0,.7)"/>
    </radialGradient>
    <filter id="frameShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="3" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope=".5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="12" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope=".4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g id="root"></g>
  <!-- light pool & vignette overlays handled in JS so they sit on top -->
</svg>
</div>

<script>
const NS='http://www.w3.org/2000/svg';
const root=document.getElementById('root');
function el(tag,attrs,parent){
  const e=document.createElementNS(NS,tag);
  for(const k in (attrs||{})) e.setAttribute(k,attrs[k]);
  (parent||root).appendChild(e);
  return e;
}
function poly(pts,attrs,parent){
  return el('polygon',{...(attrs||{}),points:pts.map(p=>p.join(',')).join(' ')},parent);
}

/* ----- ISOMETRIC PROJECTION -----
   World axes:
     d = depth into room (0 = front, +d = back wall)
     w = position along back wall  (0 = right wall, +w = left edge)
     h = height up from floor
   Screen mapping (2:1 isometric):
     x = OX + (d - w) * CX
     y = OY - (d + w) * CY - h * S
*/
const OX=820, OY=792, S=0.7;
const CX=0.866*S, CY=0.5*S;
function iso(d,w,h=0){
  return [OX+(d-w)*CX, OY-(d+w)*CY-h*S];
}

const DEPTH=700, WIDTH=900, HEIGHT=300;

// Wall transforms: map local 2D coords (lx, ly) into the wall plane.
// Back wall (at d=DEPTH): local origin = camera-top-left corner of wall.
//   local +x → camera right (decreasing w in world)
//   local +y → camera down  (decreasing h in world)
const BWT = (()=>{ // matrix(a b c d e f)
  const a=CX, b=CY, c=0, d=S;
  const e=OX+(DEPTH-WIDTH)*CX;
  const f=OY-(DEPTH+WIDTH)*CY-HEIGHT*S;
  return `matrix(${a} ${b} ${c} ${d} ${e} ${f})`;
})();
// Left wall (at w=WIDTH): the interior wall on Darwin's right (viewer's left).
//   local origin = camera-top-left = front-top corner of the left wall
//   local +x → camera right (increasing d, going into the room)
//   local +y → camera down  (decreasing h)
const LWT = (()=>{
  const a=CX, b=-CY, c=0, d=S;
  const e=OX-WIDTH*CX;
  const f=OY-WIDTH*CY-HEIGHT*S;
  return `matrix(${a} ${b} ${c} ${d} ${e} ${f})`;
})();

/* =================================================================
   1. FLOOR
================================================================= */
{
  const corners=[iso(0,0),iso(DEPTH,0),iso(DEPTH,WIDTH),iso(0,WIDTH)];
  poly(corners,{fill:'url(#floorG)'});
  // floor tile grid
  const grid=el('g',{stroke:'#22150a','stroke-width':1.5,opacity:.45});
  for(let d=100;d<DEPTH;d+=100){
    const a=iso(d,0),b=iso(d,WIDTH);
    el('line',{x1:a[0],y1:a[1],x2:b[0],y2:b[1]},grid);
  }
  for(let w=100;w<WIDTH;w+=100){
    const a=iso(0,w),b=iso(DEPTH,w);
    el('line',{x1:a[0],y1:a[1],x2:b[0],y2:b[1]},grid);
  }
  // floor edge highlight along the front
  const front=[iso(0,0),iso(0,WIDTH)];
  el('line',{x1:front[0][0],y1:front[0][1],x2:front[1][0],y2:front[1][1],
             stroke:'#1a0d04','stroke-width':2.5});
}

/* =================================================================
   2. BACK WALL (with sheared items)
================================================================= */
{
  const corners=[iso(DEPTH,0,0),iso(DEPTH,WIDTH,0),iso(DEPTH,WIDTH,HEIGHT),iso(DEPTH,0,HEIGHT)];
  poly(corners,{fill:'url(#wallG)'});

  const g=el('g',{transform:BWT});
  // wainscoting band along bottom
  el('rect',{x:0,y:HEIGHT-50,width:WIDTH,height:50,fill:'#7a5530'},g);
  el('rect',{x:0,y:HEIGHT-50,width:WIDTH,height:3,fill:'#42260e'},g);
  el('rect',{x:0,y:HEIGHT-3,width:WIDTH,height:3,fill:'#42260e'},g);

  // ----- HEX POSTER (camera-left, smallest x in local) -----
  {
    const x=60,y=30,w=200,h=210;
    el('rect',{x:x-4,y:y-4,width:w+8,height:h+8,fill:'#3a1f0a'},g);
    el('rect',{x,y,width:w,height:h,fill:'url(#paper)'},g);
    el('text',{x:x+w/2,y:y+18,'text-anchor':'middle','font-family':'Georgia,serif','font-size':12,'font-weight':'bold','letter-spacing':4,fill:'#1a1008'},g).textContent='OUTCOMES';
    // 3 cols x 2 rows hex grid
    const labels=['AIR','WATER','SOIL','BIODIVRSTY','EQUITY','CARBON'];
    const cellW=w/3, cellH=(h-30)/2;
    for(let i=0;i<6;i++){
      const c=i%3,r=Math.floor(i/3);
      const cx=x+cellW*c+cellW/2;
      const cy=y+24+cellH*r+cellH/2-6;
      const R=24;
      const pts=[];
      for(let k=0;k<6;k++){
        const ang=k*Math.PI/3-Math.PI/2;
        pts.push([cx+Math.cos(ang)*R,cy+Math.sin(ang)*R]);
      }
      poly(pts,{fill:'#fbf3df',stroke:'#1a1008','stroke-width':2},g);
      // mini icon (centered glyph instead of pixel icon)
      const glyphs=['~','◇','≡','✿','♢','C₂'];
      el('text',{x:cx,y:cy+5,'text-anchor':'middle','font-family':'Georgia,serif','font-size':16,'font-weight':'bold',fill:'#1a1008'},g).textContent=glyphs[i];
      el('text',{x:cx,y:cy+R+12,'text-anchor':'middle','font-family':'Georgia,serif','font-size':9,'font-weight':'bold','letter-spacing':1.5,fill:'#1a1008'},g).textContent=labels[i];
    }
  }

  // ----- APPLY FOR EXTRACTION sign (center) -----
  {
    const x=320,y=60,w=270,h=150;
    el('rect',{x:x-4,y:y-4,width:w+8,height:h+8,fill:'#3a1f0a'},g);
    el('rect',{x,y,width:w,height:h,fill:'url(#paper)'},g);
    el('rect',{x:x+10,y:y+10,width:w-20,height:2,fill:'#3a1f0a'},g);
    el('rect',{x:x+10,y:y+h-12,width:w-20,height:2,fill:'#3a1f0a'},g);
    el('text',{x:x+w/2,y:y+62,'text-anchor':'middle','font-family':'Georgia,serif','font-size':30,'font-weight':'bold','letter-spacing':6,fill:'#1a1008'},g).textContent='APPLY FOR';
    el('text',{x:x+w/2,y:y+100,'text-anchor':'middle','font-family':'Georgia,serif','font-size':30,'font-weight':'bold','letter-spacing':6,fill:'#1a1008'},g).textContent='EXTRACTION';
    // APPROVED stamp
    const sg=el('g',{transform:`translate(${x+w-50} ${y+h-30}) rotate(-14)`},g);
    el('rect',{x:-60,y:-22,width:120,height:40,fill:'none',stroke:'#a52323','stroke-width':3.5},sg);
    el('text',{x:0,y:6,'text-anchor':'middle','font-family':'Georgia,serif','font-size':18,'font-weight':'bold','letter-spacing':3,fill:'#a52323'},sg).textContent='APPROVED';
  }

  // ----- AMAZON framed painting (camera-right) -----
  {
    const x=620,y=30,w=240,h=200;
    el('rect',{x:x-4,y:y-4,width:w+8,height:h+8,fill:'url(#brass)'},g);
    el('rect',{x:x+4,y:y+4,width:w-8,height:h-8,fill:'#1a0d04'},g);
    // sky
    el('rect',{x:x+8,y:y+8,width:w-16,height:38,fill:'#9bc4d8'},g);
    el('circle',{cx:x+w-30,cy:y+22,r:14,fill:'#f8d486'},g);
    el('circle',{cx:x+w-30,cy:y+22,r:9,fill:'#fae6a6'},g);
    // back canopy band
    el('rect',{x:x+8,y:y+40,width:w-16,height:30,fill:'#1f3d18'},g);
    for(let i=0;i<7;i++){
      el('ellipse',{cx:x+18+i*32,cy:y+38,rx:18,ry:12,fill:'#3b6a2c'},g);
      el('ellipse',{cx:x+22+i*32,cy:y+34,rx:8,ry:5,fill:'#69a04a'},g);
    }
    // ground
    el('rect',{x:x+8,y:y+62,width:w-16,height:h-72,fill:'#274017'},g);
    // river
    el('path',{d:`M ${x+10} ${y+78} Q ${x+w/2} ${y+74} ${x+w-10} ${y+82} L ${x+w-10} ${y+88} Q ${x+w/2} ${y+82} ${x+10} ${y+86} Z`,fill:'#4d83a8'},g);
    // trees
    for(let i=0;i<5;i++){
      const tx=x+22+i*42;
      el('rect',{x:tx,y:y+98,width:5,height:42,fill:'#2a1808'},g);
      el('ellipse',{cx:tx+2,cy:y+90,rx:18,ry:14,fill:'#3b6a2c'},g);
      el('ellipse',{cx:tx+2,cy:y+82,rx:12,ry:8,fill:'#69a04a'},g);
    }
    // bird
    el('path',{d:`M ${x+170} ${y+24} q 4 -6 8 0 q 4 -6 8 0`,stroke:'#1a1208','stroke-width':1.8,fill:'none'},g);
    // plaque
    el('rect',{x:x+w/2-50,y:y+h+6,width:100,height:18,fill:'url(#brass)'},g);
    el('text',{x:x+w/2,y:y+h+19,'text-anchor':'middle','font-family':'Georgia,serif','font-size':11,'font-weight':'bold','letter-spacing':4,fill:'#3a1f0a'},g).textContent='AMAZONIA';
  }
}

/* =================================================================
   3. LEFT WALL (interior wall on Darwin's right — viewer's left)
================================================================= */
{
  const corners=[iso(0,WIDTH,0),iso(DEPTH,WIDTH,0),iso(DEPTH,WIDTH,HEIGHT),iso(0,WIDTH,HEIGHT)];
  poly(corners,{fill:'url(#wallGdark)'});
  poly(corners,{fill:'rgba(0,0,0,.18)'});

  const g=el('g',{transform:LWT});
  // wainscoting
  el('rect',{x:0,y:HEIGHT-50,width:DEPTH,height:50,fill:'#5e431f'},g);
  el('rect',{x:0,y:HEIGHT-50,width:DEPTH,height:3,fill:'#32200a'},g);
  el('rect',{x:0,y:HEIGHT-3,width:DEPTH,height:3,fill:'#32200a'},g);

  // GO OUTSIDE sign hanging above door
  {
    const x=300,y=58,w=180,h=44;
    el('rect',{x:x-3,y:y-3,width:w+6,height:h+6,fill:'#3a1f0a'},g);
    el('rect',{x,y,width:w,height:h,fill:'url(#paper)'},g);
    el('text',{x:x+w/2,y:y+30,'text-anchor':'middle','font-family':'Georgia,serif','font-size':22,'font-weight':'bold','letter-spacing':4,fill:'#1a1008'},g).textContent='GO OUTSIDE';
    // hanging chain
    el('line',{x1:x+20,y1:y,x2:x+20,y2:y-12,stroke:'#3a1f0a','stroke-width':2},g);
    el('line',{x1:x+w-20,y1:y,x2:x+w-20,y2:y-12,stroke:'#3a1f0a','stroke-width':2},g);
  }
  // DOOR
  {
    const x=315,y=110,w=150,h=180;
    el('rect',{x:x-4,y:y-4,width:w+8,height:h+8,fill:'#2a1808'},g);
    el('rect',{x,y,width:w,height:h,fill:'#6e4322'},g);
    // panels
    el('rect',{x:x+10,y:y+10,width:w-20,height:60,fill:'#3a1f0a'},g);
    el('rect',{x:x+14,y:y+14,width:w-28,height:52,fill:'#5a3216'},g);
    el('rect',{x:x+10,y:y+80,width:w-20,height:90,fill:'#3a1f0a'},g);
    el('rect',{x:x+14,y:y+84,width:w-28,height:82,fill:'#5a3216'},g);
    // knob (on the back-of-room side of the door)
    el('circle',{cx:x+w-16,cy:y+h/2,r:5,fill:'url(#brass)',stroke:'#3a1f0a','stroke-width':1.5},g);
    el('circle',{cx:x+w-16,cy:y+h/2,r:1.5,fill:'#3a1f0a'},g);
  }
  // click area (matches the door's iso projection)
  const dpts=[iso(315,WIDTH,10),iso(465,WIDTH,10),iso(465,WIDTH,190),iso(315,WIDTH,190)];
  poly(dpts,{class:'clickable',id:'doorHit',fill:'transparent'});
}

/* =================================================================
   4. CHANDELIER / LIGHT POOL (decorative ceiling glow)
================================================================= */
el('ellipse',{cx:780,cy:200,rx:520,ry:200,fill:'url(#lightPool)'});

/* =================================================================
   5. DARWIN (drawn before desk so desk hides his lower body)
   Anchor: behind desk at d≈540, w≈540, drawn as a 2D billboard.
================================================================= */
{
  const [ax,ay]=iso(540,540,170); // chest-level world anchor
  const SC=0.42;
  // The sub-SVG group is drawn in "sprite local" coords from previous version,
  // translated so sprite point (830,540) lands at (ax,ay) under scale SC.
  const g=el('g',{transform:`translate(${ax-830*SC} ${ay-540*SC}) scale(${SC})`});

  // shoulders / Victorian frock coat
  el('path',{d:'M 460 600 L 460 540 Q 500 460 690 450 L 970 450 Q 1160 460 1200 540 L 1200 600 Z',fill:'#0e0e0e'},g);
  // coat highlight stripes
  el('path',{d:'M 480 600 L 480 555 Q 510 490 580 478',stroke:'#26262a','stroke-width':3,fill:'none'},g);
  el('path',{d:'M 1180 600 L 1180 555 Q 1150 490 1080 478',stroke:'#26262a','stroke-width':3,fill:'none'},g);
  // lapels
  el('path',{d:'M 700 470 L 760 530 L 830 555 L 900 530 L 960 470 L 940 475 L 880 520 L 830 540 L 780 520 L 720 475 Z',fill:'#1f1f23'},g);
  // shirt V
  el('path',{d:'M 780 510 L 830 580 L 880 510 L 870 510 L 830 555 L 790 510 Z',fill:'#f4efe1'},g);
  // bow tie
  el('path',{d:'M 800 510 Q 820 506 830 514 Q 840 506 860 510 L 854 538 Q 840 542 830 534 Q 820 542 806 538 Z',fill:'#0a0a0a'},g);
  el('circle',{cx:830,cy:524,r:3,fill:'#1f1f23'},g);

  // BEARD
  el('path',{d:'M 650 460 Q 615 380 660 320 Q 660 280 700 270 L 960 270 Q 1000 280 1000 320 Q 1045 380 1010 460 Q 1020 560 980 620 Q 940 660 880 670 Q 830 678 780 670 Q 720 660 680 620 Q 640 560 650 460 Z',fill:'url(#beardG)'},g);
  ['M 680 470 Q 700 540 690 620','M 740 480 Q 760 560 760 660','M 830 490 Q 830 580 830 670','M 920 480 Q 900 560 900 660','M 980 470 Q 960 540 970 620']
    .forEach(d=>el('path',{d,stroke:'#c5bea7','stroke-width':2.5,fill:'none',opacity:.7},g));
  el('ellipse',{cx:700,cy:600,rx:40,ry:50,fill:'url(#beardG)'},g);
  el('ellipse',{cx:960,cy:600,rx:40,ry:50,fill:'url(#beardG)'},g);
  el('ellipse',{cx:830,cy:660,rx:80,ry:30,fill:'url(#beardG)'},g);

  // side hair tufts
  el('ellipse',{cx:680,cy:320,rx:46,ry:86,fill:'#ece6d2'},g);
  el('ellipse',{cx:985,cy:320,rx:46,ry:86,fill:'#ece6d2'},g);

  // ears
  el('ellipse',{cx:672,cy:345,rx:16,ry:26,fill:'url(#skinG)'},g);
  el('ellipse',{cx:994,cy:345,rx:16,ry:26,fill:'url(#skinG)'},g);

  // bald dome
  el('ellipse',{cx:830,cy:285,rx:140,ry:170,fill:'url(#skinG)'},g);
  el('ellipse',{cx:820,cy:170,rx:70,ry:22,fill:'#f7e6c8',opacity:.7},g);
  el('path',{d:'M 900 180 Q 970 240 968 350 Q 945 420 900 440 Q 920 360 920 280 Q 920 220 900 180 Z',fill:'#b88c5e',opacity:.35},g);

  // forehead wrinkles
  ['M 740 240 Q 830 230 920 240','M 745 278 Q 830 268 915 278','M 760 312 Q 830 304 900 312']
    .forEach(d=>el('path',{d,stroke:'#a07043','stroke-width':2.5,fill:'none',opacity:.55,'stroke-linecap':'round'},g));

  // brows
  el('path',{d:'M 715 348 Q 760 322 822 340 Q 825 352 818 358 Q 770 348 728 366 Q 716 364 715 348 Z',fill:'#2a1a10'},g);
  el('path',{d:'M 945 348 Q 900 322 838 340 Q 835 352 842 358 Q 890 348 932 366 Q 944 364 945 348 Z',fill:'#2a1a10'},g);

  // eye recesses + eyes
  el('ellipse',{cx:772,cy:378,rx:32,ry:18,fill:'#9e7048',opacity:.45},g);
  el('ellipse',{cx:888,cy:378,rx:32,ry:18,fill:'#9e7048',opacity:.45},g);
  el('ellipse',{cx:772,cy:378,rx:9,ry:6,fill:'#fbf3df'},g);
  el('ellipse',{cx:888,cy:378,rx:9,ry:6,fill:'#fbf3df'},g);
  el('circle',{cx:772,cy:378,r:5,fill:'#3e2c18'},g);
  el('circle',{cx:888,cy:378,r:5,fill:'#3e2c18'},g);
  el('circle',{cx:772,cy:378,r:2.5,fill:'#100a04'},g);
  el('circle',{cx:888,cy:378,r:2.5,fill:'#100a04'},g);
  el('circle',{cx:774,cy:376,r:1.6,fill:'#fff'},g);
  el('circle',{cx:890,cy:376,r:1.6,fill:'#fff'},g);
  el('path',{d:'M 754 392 Q 772 404 792 392',stroke:'#a07043','stroke-width':2,fill:'none',opacity:.65},g);
  el('path',{d:'M 870 392 Q 888 404 906 392',stroke:'#a07043','stroke-width':2,fill:'none',opacity:.65},g);

  // nose

/* =================================================================
   6. DESK (isometric 3D box)
   Dimensions: d=200-420, w=240-860, h=0-180
================================================================= */
{
  const d0=200,d1=420,w0=240,w1=860,h0=0,h1=180;
  // visible faces: top, front (d=d0), right (w=w0)
  // right side face
  poly([iso(d0,w0,h0),iso(d1,w0,h0),iso(d1,w0,h1),iso(d0,w0,h1)],{fill:'url(#deskSide)'});
  // front face
  poly([iso(d0,w0,h0),iso(d0,w1,h0),iso(d0,w1,h1),iso(d0,w0,h1)],{fill:'url(#deskFront)'});
  // top
  poly([iso(d0,w0,h1),iso(d0,w1,h1),iso(d1,w1,h1),iso(d1,w0,h1)],{fill:'url(#deskTop)'});
  // top edge highlight
  const e1=iso(d0,w0,h1),e2=iso(d0,w1,h1),e3=iso(d1,w0,h1);
  el('line',{x1:e1[0],y1:e1[1],x2:e2[0],y2:e2[1],stroke:'#c98050','stroke-width':2.5});
  el('line',{x1:e1[0],y1:e1[1],x2:e3[0],y2:e3[1],stroke:'#a06036','stroke-width':2.5});

  // drawer outlines (on front face) — use a clipping/translation along the front face plane
  // Front face plane: world (d=d0, w varies, h varies). Local (u=w, v=h).
  // Local +u maps to world +w → screen direction (-CX, -CY)
  // Local +v maps to world +h → screen direction (0, -S)
  const [fx,fy]=iso(d0,0,0);
  const FFT=`matrix(${-CX} ${-CY} 0 ${-S} ${fx} ${fy})`;
  const ff=el('g',{transform:FFT});
  // drawer outlines in front-face local (u=w in [w0,w1]=[240,860], v=h in [0,h1=180])
  for(let i=0;i<3;i++){
    const u0=w0+30+i*200;
    el('rect',{x:u0,y:30,width:170,height:120,fill:'none',stroke:'#1a0d04','stroke-width':2.5},ff);
    el('rect',{x:u0+70,y:80,width:30,height:14,rx:3,fill:'url(#brass)',stroke:'#3a1f0a','stroke-width':1},ff);
  }
  // nameplate, engraved on the FRONT face of desk, centered
  el('rect',{x:w0+200,y:14,width:240,height:46,fill:'#3a1f0a'},ff);
  el('rect',{x:w0+204,y:18,width:232,height:38,fill:'url(#brass)'},ff);
  el('rect',{x:w0+214,y:26,width:212,height:22,fill:'#100a04'},ff);
  el('text',{x:w0+320,y:42,'text-anchor':'middle','font-family':'Georgia,serif','font-weight':'bold','font-size':16,'letter-spacing':6,fill:'url(#brass)'},ff).textContent='MOLOTOV ALVA';
}

}

/* =================================================================
   11. INTERACTIONS
================================================================= */
const bell=document.getElementById('bellGroup');
const door=document.getElementById('doorHit');
const speech=document.getElementById('speech');
let t1,t2;
function ring(){
  speech.classList.add('show');
  bell.classList.remove('ringing'); void bell.getBoundingClientRect();
  bell.classList.add('ringing');
  clearTimeout(t1); clearTimeout(t2);
  t1=setTimeout(()=>bell.classList.remove('ringing'),600);
  t2=setTimeout(()=>speech.classList.remove('show'),7000);
}
bell.addEventListener('click',ring);
door.addEventListener('click',ring);
